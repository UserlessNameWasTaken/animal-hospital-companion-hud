name: Publish Windows downloads

on:
  push:
    branches: [main]
    paths:
      - "Team/**"
      - "Publish-WindowsApps.ps1"
      - "Publish Windows Apps.cmd"
      - ".github/workflows/windows-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build self-contained packages
        shell: powershell
        run: ./Publish-WindowsApps.ps1

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Animal-Hospital-Team-HUD-Windows
          path: |
            dist/AnimalHospitalTeamHUD-Windows-x64.zip
            dist/AnimalHospitalTeamRelay-Windows-x64.zip
          if-no-files-found: error

      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v0.1.${{ github.run_number }}"
          gh release create $tag `
            "dist/AnimalHospitalTeamHUD-Windows-x64.zip#Team HUD for players" `
            "dist/AnimalHospitalTeamRelay-Windows-x64.zip#Relay package for hosts" `
            --target "${{ github.sha }}" `
            --title "Animal Hospital Team HUD $tag" `
            --notes "Download **AnimalHospitalTeamHUD-Windows-x64.zip**, extract it, and double-click **AnimalHospitalTeamHUD.exe**. The relay ZIP is only for the person hosting the shared server."
